<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập – MealKit Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

<div class="auth-layout">
  <!-- LEFT: ảnh + quote -->
  <div class="auth-visual">
    <a href="index.html" class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="#2d6a4f"/>
        <path d="M10 22 Q14 12 18 18 Q22 24 26 14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="18" cy="10" r="2.5" fill="#95d5b2"/>
      </svg>
      MealKit <em>Việt</em>
    </a>
    <img src="https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=800&q=80" alt="Bữa ăn ngon" />
    <div class="auth-visual__overlay"></div>
    <div class="auth-visual__quote">
      <p>"Bữa ăn ngon nhất là bữa ăn bạn tự nấu cho gia đình."</p>
    </div>
  </div>

  <!-- RIGHT: form -->
  <div class="auth-form-wrap">
    <div class="auth-form-box">
      <div class="auth-form-header">
        <h1>Chào mừng trở lại 👋</h1>
        <p>Đăng nhập để xem thực đơn và quản lý đơn hàng của bạn.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="email" name="email" placeholder="ten@email.com" autocomplete="email" required />
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">
            Mật khẩu
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
          </label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" aria-label="Hiện mật khẩu" onclick="togglePw('password', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember" name="remember" />
          <label for="remember">Ghi nhớ đăng nhập</label>
        </div>

        <button type="submit" class="btn btn--primary btn--block" id="loginBtn">
          <span>Đăng nhập</span>
        </button>

        <div class="auth-divider"><span>hoặc</span></div>

        <button type="button" class="btn btn--social">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Tiếp tục với Google
        </button>
      </form>

      <p class="auth-switch">Chưa có tài khoản? <a href="register.html">Đăng ký ngay →</a></p>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
