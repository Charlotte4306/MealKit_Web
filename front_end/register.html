<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký – MealKit Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">

<div class="auth-layout">
  <div class="auth-visual">
    <a href="/index" class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="#2d6a4f"/>
        <path d="M10 22 Q14 12 18 18 Q22 24 26 14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="18" cy="10" r="2.5" fill="#95d5b2"/>
      </svg>
      MealKit <em>Việt</em>
    </a>
    <img src="https://images.unsplash.com/photo-1543353071-10c8ba85a904?w=800&q=80" alt="Nông sản sạch" />
    <div class="auth-visual__overlay"></div>
    <div class="auth-visual__quote">
      <p>"Hơn 2,400 gia đình đang nấu ăn khoẻ mạnh hơn mỗi ngày."</p>
    </div>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-form-box">
      <div class="auth-form-header">
        <h1>Tạo tài khoản miễn phí 🌿</h1>
        <p>Đăng ký để nhận ưu đãi 20% cho đơn hàng đầu tiên.</p>
      </div>

      <form id="registerForm" class="auth-form" novalidate onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <div class="input-wrap">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required />
            </div>
            <span class="field-error" id="fullnameError"></span>
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <div class="input-wrap">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.02 2.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
              <input type="tel" id="phone" name="phone" placeholder="09xxxxxxxx" required />
            </div>
            <span class="field-error" id="phoneError"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="reg-email" name="email" placeholder="ten@email.com" required />
          </div>
          <span class="field-error" id="regEmailError"></span>
        </div>

        <div class="form-group">
          <label for="reg-password">Mật khẩu</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="reg-password" name="password" placeholder="Tối thiểu 8 ký tự" required />
            <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)" aria-label="Hiện mật khẩu">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength" id="pwStrength"><div class="pw-strength__bar"></div></div>
          <span class="field-error" id="regPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Xác nhận mật khẩu</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="confirm-password" name="confirm_password" placeholder="Nhập lại mật khẩu" required />
          </div>
          <span class="field-error" id="confirmPasswordError"></span>
        </div>

        <div class="form-check">
          <input type="checkbox" id="agree" name="agree" required />
          <label for="agree">Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a></label>
        </div>
        <span class="field-error" id="agreeError"></span>

        <button type="submit" class="btn btn--primary btn--block" id="registerBtn">
          <span>Tạo tài khoản</span>
        </button>

          <div class="auth-divider"><span>hoặc</span></div>

          <div id="g_id_onload"
               data-client_id="762065859770-13bu2eklqiesavsva5bpbf0cq979pilt.apps.googleusercontent.com"
               data-callback="handleGoogleLogin"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-size="large"
               data-theme="outline"
               data-text="continue_with"
               data-shape="rectangular"
               data-width="100%">
          </div>
      </form>

      <p class="auth-switch">Đã có tài khoản? <a href="/login">Đăng nhập →</a></p>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
